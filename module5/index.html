<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inspiration & Quotes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <header>
                <h1>Quote of the Moment</h1>
                <p class="subtitle">Get inspired by fetching real-time data</p>
            </header>
            
            <div class="quote-container" id="quote-container">
                <div class="loader" id="loader"></div>
                <div class="content" id="content" style="display: none;">
                    <svg class="quote-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" />
                    </svg>
                    <p class="quote-text" id="quote-text">Loading...</p>
                    <p class="quote-author" id="quote-author">-</p>
                </div>
                <div class="error-state" id="error-state" style="display: none;">
                    <p>Oops! Couldn't grab a quote right now. Please try again.</p>
                </div>
            </div>

            <button class="refresh-btn" id="refresh-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                <span>Generate New Quote</span>
            </button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
